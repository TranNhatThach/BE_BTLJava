spring.application.name=tutor
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=HeThongGiaSu;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
# Global NVARCHAR mapping for Hibernate 6
spring.jpa.properties.hibernate.type.preferred_n_string_jdbc_types=true

# Character Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

spring.web.cors.allowed-origins=http://localhost:5173
logging.level.org.springframework.web=DEBUG